version: "3.8"

services:
  app:
    build: .
    container_name: daihuo-jianshou
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - NODE_ENV=production
    # Add your API keys below:
    #   - FAL_AI_KEY=xxx
    #   - VOLCENGINE_KEY=xxx

volumes:
  sqlite_data:
